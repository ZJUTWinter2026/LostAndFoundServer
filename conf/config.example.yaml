# 应用基础配置
app:
  name: "app"
  env: "dev"

# HTTP 服务配置
http_server:
  addr: ":8000"
  log:
    # 仅在本地开发调试时打开
    # access_filename: "/dev/stdout"
    # error_filename: "/dev/stderr"

session:
  driver: "memory"
  name: "session"
  secret: "lostandfound2026"

# 业务私有配置
biz:
  upload:
    dir: "uploads"
    base_url: "http://127.0.0.1:8000"
    max_size_mb: 10

  # Agent配置
  agent:
    enable: true

    # 主LLM配置 (OpenAI兼容格式)
    llm:
      base_url: "https://api.openai.com/v1"
      api_key: "your-api-key"
      model: "gpt-4o"
      extra_fields: {
          "thinking": {
              "type": "disabled"
          }
      }

    # 视觉LLM配置 (用于图片内容识别)
    vision_llm:
      base_url: "https://api.openai.com/v1"
      api_key: "your-api-key"
      model: "gpt-4o"

    # 嵌入模型配置
    embedding:
      base_url: "https://api.openai.com/v1"
      api_key: "your-api-key"
      model: "text-embedding-3-small"
      dimension: 1536

    # Milvus向量数据库配置
    milvus:
      address: "localhost:19530"
      collection: "lost_and_found"

# 应用业务日志配置
log:
  level: 4
  # 仅在本地开发调试时打开
  # filename: "/dev/stdout"

# HTTP Client 配置
resty:
  timeout: "5s"

# 跨域中间件配置
mid_cors:
  allow_origins: ["*"]

# 数据库配置
db:
  host: "127.0.0.1"
  port: 3306
  username: "jh_user"
  password: "jh_pass"
  database: "jh_db"

# 飞书告警配置
feishu:
  enable: false
  notice_webhook: ""
  notice_secret: ""
