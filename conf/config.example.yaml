# 应用基础配置
app:
  name: "app" # 应用名称
  env: "dev" # 应用环境 dev|test|prod

# HTTP 服务配置
http_server:
  addr: ":8000"
  log:
    # 仅在本地开发调试时打开
    # access_filename: "/dev/stdout"
    # error_filename: "/dev/stderr"

session:
  driver: "memory" # 底层驱动 memory(内存) | redis
  name: "session" # 名称
  secret: "lostandfound2026" # 密钥

# 业务私有配置
biz:
  upload:
    dir: "uploads" # 上传目录
    base_url: "http://127.0.0.1:8000" # 访问前缀
    max_size_mb: 10 # 单文件最大 MB

# 应用业务日志配置
log:
  level: 4 # 日志级别 0: panic 1: fatal 2: error 3: warn 4: info 5: debug 6: trace
  # 仅在本地开发调试时打开
  # filename: "/dev/stdout"

# HTTP Client 配置
resty:
  timeout: "5s"

# 跨域中间件配置
mid_cors:
  allow_origins: ["*"]

# 数据库配置
db:
  host: "127.0.0.1"
  port: 3306
  username: "jh_user"
  password: "jh_pass"
  database: "jh_db"

# 飞书告警配置
feishu:
  enable: false
  notice_webhook: ""
  notice_secret: ""
